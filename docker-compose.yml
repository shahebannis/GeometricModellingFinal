services:

  exp:
    build: .
    image: pceval:latest
    volumes:
      - "${DATA_DIR:-./data}:/data:ro"
      - "./results:/results"
    entrypoint: ["python3", "run_experiment.py"]
    command: ["--synthetic"]

  app:
    build: .
    image: pceval:latest
    volumes:
      - "${DATA_DIR:-./data}:/data:ro"
      - "./results:/results"
    ports:
      - "5000:5000"
    entrypoint: ["python3", "app/app.py"]